<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✅ REQUIRED FOR BASE VERIFICATION -->
  <meta name="base:app_id" content="69d8a85f34c69936dc95d6d0" />

  <title>Base App Gone</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      padding: 30px;
      border-radius: 16px;
      background: #1e293b;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🚀 Base App Connected</h1>
    <p>Your app is ready for Base verification.</p>
    <button onclick="connectWallet()">Connect Wallet</button>
    <p id="status"></p>
  </div>

  <script>
    async function connectWallet() {
      if (window.ethereum) {
        try {
          const accounts = await ethereum.request({
            method: "eth_requestAccounts",
          });
          document.getElementById("status").innerText =
            "Connected: " + accounts[0];
        } catch (err) {
          document.getElementById("status").innerText =
            "Connection rejected";
        }
      } else {
        document.getElementById("status").innerText =
          "Install MetaMask";
      }
    }
  </script>
</body>
</html>
